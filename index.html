<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIAO ❤️ DING</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 加载 React 相关库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 加载 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 加载 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95) translateX(-50%); }
            to { opacity: 1; transform: scale(1) translateX(-50%); }
        }
        .animate-fade { 
            animation: fade-in 1.5s ease-out forwards; 
            transform-origin: left center;
        }
        #ui-wrapper {
            will-change: transform;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const App = () => {
            const canvasRef = useRef(null);
            const uiRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000, active: false });
            const tiltRef = useRef({ x: 0, y: 0 }); 
            const [bpm, setBpm] = useState(72);
            const [initialized, setInitialized] = useState(false);

            // 陀螺仪逻辑：在第一次交互时触发
            const handleFirstInteraction = async () => {
                if (initialized) return;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) { console.log("Motion access blocked"); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                setInitialized(true);
            };

            const handleOrientation = (event) => {
                let x = event.gamma || 0; 
                let y = event.beta || 0;
                
                // 限制陀螺仪角度范围，用于 3D 旋转的基准数值
                tiltRef.current = {
                    x: Math.max(-60, Math.min(60, x)),
                    y: Math.max(-60, Math.min(60, y - 45))
                };
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                // 提升粒子密度，极大幅度降低初速度，让粒子死死吸附在“边界”上
                const settings = {
                    particles: { 
                        // 这里是粒子数量的设置，原本是 2500 和 4500，现在翻倍到 5000 和 9000
                        length: window.innerWidth < 768 ? 5000 : 9000,
                        duration: 2.2, 
                        velocity: 15,   
                        effect: -0.2,   
                        size: window.innerWidth < 768 ? 1.5 : 2.0
                    },
                    interaction: { radius: 110, strength: 120 } 
                };

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                // 核心重写：不再生成实心球，而是生成带有 Z 轴厚度的“空心丝带边界”
                const pointOnHeart3D = (t, p) => {
                    const scale = window.innerWidth < 768 ? 0.75 : 1.1;
                    
                    // 完全基于 2D 爱心方程，保证正面看是一个标准的锐利爱心
                    const baseX = 16 * Math.pow(Math.sin(t), 3);
                    const baseY = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 3 * Math.cos(3 * t) - Math.cos(4 * t);
                    
                    // Z 轴提供“丝带厚度”，让其在旋转时展现 3D 结构
                    const thickness = window.innerWidth < 768 ? 40 : 60; 
                    const z = (p - 0.5) * thickness; 

                    // 微微的随机抖动让线条看起来是有机的发光体，而不是死板的 1 像素线
                    const jitter = 1.0;
                    const jx = (Math.random() - 0.5) * jitter;
                    const jy = (Math.random() - 0.5) * jitter;

                    return {
                        x: (baseX * 11.25 + jx) * scale,
                        y: (baseY * 11.5 + jy) * scale,
                        z: z * scale
                    };
                };

                class Particle {
                    constructor() {
                        this.position = { x: 0, y: 0, z: 0 };
                        this.velocity = { x: 0, y: 0, z: 0 };
                        this.acceleration = { x: 0, y: 0, z: 0 };
                        this.age = 0;
                        this.randomScale = Math.random() * 0.5 + 0.5;
                    }
                    initialize(x, y, z, dx, dy, dz) {
                        this.position.x = x; this.position.y = y; this.position.z = z;
                        this.velocity.x = dx; this.velocity.y = dy; this.velocity.z = dz;
                        this.acceleration.x = dx * settings.particles.effect;
                        this.acceleration.y = dy * settings.particles.effect;
                        this.acceleration.z = dz * settings.particles.effect;
                        this.age = 0;
                        this.duration = settings.particles.duration;
                    }
                    update(deltaTime, mouse, angleX, angleY, centerX, centerY, pulse) {
                        this.position.x += this.velocity.x * deltaTime;
                        this.position.y += this.velocity.y * deltaTime;
                        this.position.z += this.velocity.z * deltaTime;
                        
                        this.velocity.x += this.acceleration.x * deltaTime;
                        this.velocity.y += this.acceleration.y * deltaTime;
                        this.velocity.z += this.acceleration.z * deltaTime;
                        
                        this.age += deltaTime;

                        if (mouse.active) {
                            let px = this.position.x * pulse;
                            let py = this.position.y * pulse;
                            let pz = this.position.z * pulse;

                            let y1 = py * Math.cos(angleX) - pz * Math.sin(angleX);
                            let z1 = py * Math.sin(angleX) + pz * Math.cos(angleX);
                            let x2 = px * Math.cos(angleY) - z1 * Math.sin(angleY);
                            let z2 = px * Math.sin(angleY) + z1 * Math.cos(angleY);

                            const fov = 300;
                            let perspective = fov / (fov + z2);
                            let canvasX = centerX + x2 * perspective;
                            let canvasY = centerY - y1 * perspective;

                            let dx = canvasX - mouse.x;
                            let dy = canvasY - mouse.y;
                            let distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < settings.interaction.radius) {
                                const safeDistance = Math.max(1, distance);
                                const force = (settings.interaction.radius - distance) / settings.interaction.radius;
                                this.position.x += (dx / safeDistance) * force * settings.interaction.strength * deltaTime;
                                this.position.y -= (dy / safeDistance) * force * settings.interaction.strength * deltaTime;
                            }
                        }
                    }
                    draw(ctx, image, angleX, angleY, centerX, centerY, pulse) {
                        const ease = (t) => (--t) * t * t + 1;
                        const progress = this.age / this.duration;

                        let px = this.position.x * pulse;
                        let py = this.position.y * pulse;
                        let pz = this.position.z * pulse;

                        // 3D 旋转矩阵
                        let y1 = py * Math.cos(angleX) - pz * Math.sin(angleX);
                        let z1 = py * Math.sin(angleX) + pz * Math.cos(angleX);
                        let x2 = px * Math.cos(angleY) - z1 * Math.sin(angleY);
                        let z2 = px * Math.sin(angleY) + z1 * Math.cos(angleY);

                        // 强烈的透视投影（FOV = 300 保证了近大远小的夸张感）
                        const fov = 300;
                        const perspective = fov / (fov + z2);
                        const canvasX = centerX + x2 * perspective;
                        const canvasY = centerY - y1 * perspective;

                        // 限制最大放大倍数，防止粒子盖住全屏
                        const size = Math.min(image.width * 5, image.width * ease(progress) * this.randomScale * perspective);
                        ctx.globalAlpha = (1 - progress) * 0.85;
                        ctx.drawImage(image, canvasX - size / 2, canvasY - size / 2, size, size);
                    }
                }

                class ParticlePool {
                    constructor(length) {
                        this.particles = Array.from({length}, () => new Particle());
                        this.firstActive = 0; this.firstFree = 0;
                        this.duration = settings.particles.duration;
                    }
                    add(x, y, z, dx, dy, dz) {
                        this.particles[this.firstFree].initialize(x, y, z, dx, dy, dz);
                        this.firstFree = (this.firstFree + 1) % this.particles.length;
                        if (this.firstActive === this.firstFree) this.firstActive = (this.firstActive + 1) % this.particles.length;
                    }
                    update(deltaTime, mouse, angleX, angleY, centerX, centerY, pulse) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].update(deltaTime, mouse, angleX, angleY, centerX, centerY, pulse);
                            i = (i + 1) % this.particles.length;
                        }
                        while (this.particles[this.firstActive].age >= this.duration && this.firstActive !== this.firstFree) {
                            this.firstActive = (this.firstActive + 1) % this.particles.length;
                        }
                    }
                    draw(ctx, image, angleX, angleY, centerX, centerY, pulse) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].draw(ctx, image, angleX, angleY, centerX, centerY, pulse);
                            i = (i + 1) % this.particles.length;
                        }
                    }
                }

                const particles = new ParticlePool(settings.particles.length);
                const particleRate = settings.particles.length / settings.particles.duration;
                let time;

                const texture = (() => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = tCanvas.height = settings.particles.size * 3;
                    const tCtx = tCanvas.getContext('2d');
                    const grd = tCtx.createRadialGradient(tCanvas.width/2, tCanvas.height/2, 0, tCanvas.width/2, tCanvas.height/2, tCanvas.width/2);
                    grd.addColorStop(0, 'rgba(255, 30, 70, 1)');
                    grd.addColorStop(1, 'rgba(255, 30, 70, 0)');
                    tCtx.fillStyle = grd;
                    tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
                    return tCanvas;
                })();

                let smoothTilt = { x: 0, y: 0 };

                const render = () => {
                    animationFrameId = requestAnimationFrame(render);
                    const newTime = Date.now() / 1000;
                    const deltaTime = newTime - (time || newTime);
                    time = newTime;
                    
                    ctx.fillStyle = 'rgba(5, 5, 5, 0.23)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    smoothTilt.x += (tiltRef.current.x - smoothTilt.x) * 0.1;
                    smoothTilt.y += (tiltRef.current.y - smoothTilt.y) * 0.1;

                    // 1. 反转 UI 的位移方向，拉大系数，与底层粒子形成多层视差分离
                    if (uiRef.current) {
                        uiRef.current.style.transform = `translate3d(${-smoothTilt.x * 0.6}px, ${-smoothTilt.y * 0.6}px, 0)`;
                    }

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2 - 40;
                    
                    const distToMouse = Math.sqrt(Math.pow(mouseRef.current.x - centerX, 2) + Math.pow(mouseRef.current.y - centerY, 2));
                    const targetBpm = distToMouse < 180 ? 122 : 68;
                    setBpm(b => b + (targetBpm - b) * 0.05);

                    const pulse = 1 + Math.sin(time * (bpm / 12)) * 0.08;
                    const amount = particleRate * deltaTime;
                    
                    // 2. 效果二核心：反转旋转角度，模拟摄像机视角围绕实体移动
                    const angleY = -smoothTilt.x * (Math.PI / 180) * 1.5; 
                    const angleX = smoothTilt.y * (Math.PI / 180) * 1.5; 

                    // 3. 摄像机视差平移：模拟你透过屏幕边缘观察，物体产生的反向相对位移
                    const renderCenterX = centerX - smoothTilt.x * 2.0;
                    const renderCenterY = centerY - smoothTilt.y * 2.0;

                    for (let i = 0; i < amount; i++) {
                        const t = 2 * Math.PI * Math.random();
                        const p = (Math.random() + Math.random() + Math.random()) / 3; 
                        
                        const pos3D = pointOnHeart3D(t, p);
                        
                        // 核心：85% 的粒子几乎没有速度，牢牢吸附在边界上形成锐利轮廓
                        const isCore = Math.random() > 0.15; 
                        const vMult = isCore ? (Math.random() * 2) : (Math.random() * 35 + 5);
                        
                        // 计算基于中心的向外法线速度（主要在2D平面扩散，防止Z轴乱飞破坏结构）
                        const len2D = Math.sqrt(pos3D.x * pos3D.x + pos3D.y * pos3D.y) || 1;
                        const vx = (pos3D.x / len2D) * vMult;
                        const vy = (pos3D.y / len2D) * vMult;
                        const vz = (Math.random() - 0.5) * vMult * 0.3; // Z轴只给极小的位移

                        particles.add(pos3D.x, pos3D.y, pos3D.z, vx, vy, vz);
                    }
                    
                    // 4. 将带有反向视差平移的 renderCenter 传递给更新和渲染函数
                    particles.update(deltaTime, mouseRef.current, angleX, angleY, renderCenterX, renderCenterY, pulse);
                    particles.draw(ctx, texture, angleX, angleY, renderCenterX, renderCenterY, pulse);
                };

                render();
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('deviceorientation', handleOrientation);
                };
            }, [bpm]);

            const handleInteraction = (x, y, active) => {
                mouseRef.current = { x, y, active };
                if (active) handleFirstInteraction();
            };

            return (
                <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans text-white select-none cursor-crosshair"
                     onMouseMove={(e) => handleInteraction(e.clientX, e.clientY, true)}
                     onMouseLeave={() => handleInteraction(-1000, -1000, false)}
                     onTouchStart={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchMove={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchEnd={() => handleInteraction(-1000, -1000, false)}>
                    
                    <div className="absolute inset-0 pointer-events-none opacity-5" style={{ backgroundImage: 'radial-gradient(#ff1e46 1px, transparent 1px)', backgroundSize: '50px 50px' }} />
                    <canvas ref={canvasRef} className="absolute inset-0" />
                    
                    <div ref={uiRef} id="ui-wrapper" className="absolute inset-0 pointer-events-none">
                        <nav className="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-red-500/30 flex items-center justify-center rotate-45">
                                    <i data-lucide="heart" className="w-3 h-3 text-red-500/80 -rotate-45 fill-red-500/40"></i>
                                </div>
                                <span className="font-bold tracking-[0.4em] text-[9px] opacity-40 uppercase">FOREVER_HEART.sys</span>
                            </div>
                        </nav>

                        <div className="absolute top-[65%] md:top-[70%] left-1/2 -translate-x-1/2 flex flex-col items-center justify-center w-full max-w-[100vw] px-4 box-border animate-fade">
                            <div className="flex items-center justify-center gap-2 sm:gap-4 md:gap-8 font-black text-white/95 drop-shadow-[0_0_25px_rgba(255,30,70,0.5)]">
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">XIAO</span>
                                <i data-lucide="heart" className="w-[clamp(2rem,6vw,4rem)] h-[clamp(2rem,6vw,4rem)] text-red-500 fill-red-500 animate-pulse shrink-0"></i>
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">DING</span>
                            </div>
                            <div className="h-[1px] w-32 md:w-64 bg-gradient-to-r from-transparent via-red-500/30 to-transparent mt-4 md:mt-8" />
                        </div>

                        <div className="absolute bottom-0 left-0 w-full p-8 md:p-10 flex justify-between items-end opacity-30 text-[9px] tracking-[0.2em] font-mono uppercase">
                            <div className="flex flex-col gap-1">
                                <div>Sync: Stable</div>
                                <div>BPM: {Math.round(bpm)}</div>
                            </div>
                            <div className="text-right tracking-[0.3em]">
                                X & D <br/> Affinity
                            </div>
                        </div>
                    </div>

                    {!initialized && (
                        <div className="absolute top-[85%] left-1/2 -translate-x-1/2 pointer-events-none animate-pulse text-[10px] tracking-[0.6em] opacity-40 uppercase text-center w-full">
                            Touch to start affinity
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 300);
    </script>
</body>
</html>
