<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIAO ❤️ DING</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 加载 React 相关库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 加载 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 加载 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fade-in 1.2s ease-out forwards; }
        /* 动态偏移容器 */
        #ui-container {
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const App = () => {
            const canvasRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000, active: false });
            const tiltRef = useRef({ x: 0, y: 0 }); 
            const [bpm, setBpm] = useState(72);
            const [initialized, setInitialized] = useState(false);
            const [uiOffset, setUiOffset] = useState({ x: 0, y: 0 });

            // 陀螺仪逻辑：在第一次交互时触发
            const handleFirstInteraction = async () => {
                if (initialized) return;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    } catch (e) { console.log("Motion init blocked"); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
                setInitialized(true);
            };

            const handleOrientation = (event) => {
                // gamma: 左右倾斜, beta: 前后倾斜
                let x = event.gamma || 0; 
                let y = event.beta || 0;
                
                // 限制角度并计算偏移量
                tiltRef.current = {
                    x: Math.max(-30, Math.min(30, x)) * 3.5,
                    y: Math.max(-30, Math.min(30, y - 45)) * 3.5
                };
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const settings = {
                    particles: { 
                        length: window.innerWidth < 768 ? 2000 : 3500,
                        duration: 2.5, 
                        velocity: 80, 
                        effect: -0.6, 
                        size: window.innerWidth < 768 ? 1.8 : 2.2
                    },
                    interaction: { radius: 100, strength: 1.8 } // 减弱排斥强度防止粒子消失
                };

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const pointOnHeart = (t) => {
                    const scale = window.innerWidth < 768 ? 0.75 : 1.05;
                    return {
                        x: 180 * Math.pow(Math.sin(t), 3) * scale,
                        y: (150 * Math.cos(t) - 60 * Math.cos(2 * t) - 30 * Math.cos(3 * t) - 15 * Math.cos(4 * t)) * scale
                    };
                };

                class Particle {
                    constructor() {
                        this.position = { x: 0, y: 0 };
                        this.velocity = { x: 0, y: 0 };
                        this.acceleration = { x: 0, y: 0 };
                        this.age = 0;
                        this.randomScale = Math.random() * 0.5 + 0.5;
                    }
                    initialize(x, y, dx, dy) {
                        this.position.x = x; this.position.y = y;
                        this.velocity.x = dx; this.velocity.y = dy;
                        this.acceleration.x = dx * settings.particles.effect;
                        this.acceleration.y = dy * settings.particles.effect;
                        this.age = 0;
                    }
                    update(deltaTime, mouse) {
                        this.position.x += this.velocity.x * deltaTime;
                        this.position.y += this.velocity.y * deltaTime;
                        this.velocity.x += this.acceleration.x * deltaTime;
                        this.velocity.y += this.acceleration.y * deltaTime;
                        this.age += deltaTime;

                        if (mouse.active) {
                            const dx = this.position.x - mouse.x;
                            const dy = this.position.y - mouse.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < settings.interaction.radius) {
                                // 加入最小距离限制，防止分母过小导致粒子飞出
                                const safeDist = Math.max(distance, 10);
                                const force = (settings.interaction.radius - safeDist) / settings.interaction.radius;
                                this.position.x += (dx / safeDist) * force * settings.interaction.strength;
                                this.position.y += (dy / safeDist) * force * settings.interaction.strength;
                            }
                        }
                    }
                    draw(ctx, image) {
                        const ease = (t) => (--t) * t * t + 1;
                        const progress = this.age / settings.particles.duration;
                        const size = image.width * ease(progress) * this.randomScale;
                        ctx.globalAlpha = (1 - progress) * 0.8;
                        ctx.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
                    }
                }

                class ParticlePool {
                    constructor(length) {
                        this.particles = Array.from({length}, () => new Particle());
                        this.firstActive = 0; this.firstFree = 0;
                        this.duration = settings.particles.duration;
                    }
                    add(x, y, dx, dy) {
                        this.particles[this.firstFree].initialize(x, y, dx, dy);
                        this.firstFree = (this.firstFree + 1) % this.particles.length;
                        if (this.firstActive === this.firstFree) this.firstActive = (this.firstActive + 1) % this.particles.length;
                    }
                    update(deltaTime, mouse) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].update(deltaTime, mouse);
                            i = (i + 1) % this.particles.length;
                        }
                        while (this.particles[this.firstActive].age >= this.duration && this.firstActive !== this.firstFree) {
                            this.firstActive = (this.firstActive + 1) % this.particles.length;
                        }
                    }
                    draw(ctx, image) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].draw(ctx, image);
                            i = (i + 1) % this.particles.length;
                        }
                    }
                }

                const particles = new ParticlePool(settings.particles.length);
                const particleRate = settings.particles.length / settings.particles.duration;
                let time;

                const texture = (() => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = tCanvas.height = settings.particles.size * 3;
                    const tCtx = tCanvas.getContext('2d');
                    const grd = tCtx.createRadialGradient(tCanvas.width/2, tCanvas.height/2, 0, tCanvas.width/2, tCanvas.height/2, tCanvas.width/2);
                    grd.addColorStop(0, 'rgba(255, 35, 75, 1)');
                    grd.addColorStop(1, 'rgba(255, 35, 75, 0)');
                    tCtx.fillStyle = grd;
                    tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
                    return tCanvas;
                })();

                let smoothTilt = { x: 0, y: 0 };

                const render = () => {
                    animationFrameId = requestAnimationFrame(render);
                    const newTime = Date.now() / 1000;
                    const deltaTime = newTime - (time || newTime);
                    time = newTime;
                    
                    ctx.fillStyle = 'rgba(5, 5, 5, 0.22)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 平滑陀螺仪数值
                    smoothTilt.x += (tiltRef.current.x - smoothTilt.x) * 0.08;
                    smoothTilt.y += (tiltRef.current.y - smoothTilt.y) * 0.08;
                    
                    // 将偏移量同步到 UI 状态
                    setUiOffset({ x: smoothTilt.x, y: smoothTilt.y });

                    const centerX = canvas.width / 2 + smoothTilt.x;
                    const centerY = canvas.height / 2 - 60 + smoothTilt.y;
                    
                    const distToMouse = Math.sqrt(Math.pow(mouseRef.current.x - centerX, 2) + Math.pow(mouseRef.current.y - centerY, 2));
                    const targetBpm = distToMouse < 180 ? 122 : 68;
                    setBpm(b => b + (targetBpm - b) * 0.05);

                    const pulse = 1 + Math.sin(time * (bpm / 12)) * 0.08;
                    const amount = particleRate * deltaTime;
                    for (let i = 0; i < amount; i++) {
                        const t = Math.PI - 2 * Math.PI * Math.random();
                        const pos = pointOnHeart(t);
                        const dir = { x: pos.x * pulse, y: -pos.y * pulse };
                        const len = Math.sqrt(dir.x * dir.x + dir.y * dir.y);
                        particles.add(centerX + dir.x, centerY + dir.y, dir.x / len * settings.particles.velocity, dir.y / len * settings.particles.velocity);
                    }
                    particles.update(deltaTime, mouseRef.current);
                    particles.draw(ctx, texture);
                };

                render();
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('deviceorientation', handleOrientation);
                };
            }, [bpm]);

            const updateInteraction = (x, y, active) => {
                mouseRef.current = { x, y, active };
                if (active) handleFirstInteraction();
            };

            return (
                <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans text-white select-none cursor-crosshair"
                     onMouseMove={(e) => updateInteraction(e.clientX, e.clientY, true)}
                     onMouseLeave={() => updateInteraction(-1000, -1000, false)}
                     onTouchStart={(e) => updateInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchMove={(e) => updateInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchEnd={() => updateInteraction(-1000, -1000, false)}>
                    
                    <div className="absolute inset-0 pointer-events-none opacity-5" style={{ backgroundImage: 'radial-gradient(#ff1e46 1px, transparent 1px)', backgroundSize: '50px 50px' }} />
                    <canvas ref={canvasRef} className="absolute inset-0" />
                    
                    {/* UI Container with Gyro Sync */}
                    <div id="ui-container" className="absolute inset-0 pointer-events-none" style={{ transform: `translate(${uiOffset.x}px, ${uiOffset.y}px)` }}>
                        <nav className="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-red-500/30 flex items-center justify-center rotate-45">
                                    <i data-lucide="heart" className="w-3 h-3 text-red-500/80 -rotate-45 fill-red-500/40"></i>
                                </div>
                                <span className="font-bold tracking-[0.4em] text-[9px] opacity-40 uppercase">FOREVER_HEART.sys</span>
                            </div>
                        </nav>

                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 translate-y-[120px] md:translate-y-[160px] flex flex-col items-center w-full animate-fade">
                            <div className="flex items-center gap-4 md:gap-6 text-4xl md:text-6xl font-black tracking-widest text-white/95 drop-shadow-[0_0_20px_rgba(255,30,70,0.5)]">
                                <span>XIAO</span>
                                <i data-lucide="heart" className="w-10 h-10 md:w-16 md:h-16 text-red-500 fill-red-500 animate-pulse"></i>
                                <span>DING</span>
                            </div>
                            <div className="h-[1px] w-32 md:w-64 bg-gradient-to-r from-transparent via-red-500/30 to-transparent mt-6" />
                        </div>

                        <div className="absolute bottom-10 left-10 opacity-30 text-[9px] tracking-[0.2em] font-mono flex flex-col gap-1 uppercase">
                            <div>Synchronization: Stable</div>
                            <div>Heartbeat: {Math.round(bpm)} BPM</div>
                        </div>

                        <div className="absolute bottom-10 right-10 text-right opacity-20 text-[8px] tracking-[0.3em] font-mono uppercase">
                            X & D <br/> Digital Soul Affinity
                        </div>
                    </div>

                    {!initialized && (
                        <div className="absolute bottom-24 left-1/2 -translate-x-1/2 pointer-events-none animate-pulse text-[10px] tracking-[0.5em] opacity-40 uppercase text-center w-full">
                            Touch screen to activate heart
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize icons
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 200);
    </script>
</body>
</html>
