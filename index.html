<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIAO ❤️ DING</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 加载 React 相关库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 加载 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 加载 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95) translateX(-50%); }
            to { opacity: 1; transform: scale(1) translateX(-50%); }
        }
        .animate-fade { 
            animation: fade-in 1.5s ease-out forwards; 
            transform-origin: left center;
        }
        #ui-wrapper {
            will-change: transform;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const App = () => {
            const canvasRef = useRef(null);
            const uiRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000, active: false });
            const tiltRef = useRef({ x: 0, y: 0 }); 
            const [bpm, setBpm] = useState(72);
            const [initialized, setInitialized] = useState(false);

            const handleFirstInteraction = async () => {
                if (initialized) return;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) { console.log("Motion access blocked"); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                setInitialized(true);
            };

            const handleOrientation = (event) => {
                let x = event.gamma || 0; 
                let y = event.beta || 0;
                tiltRef.current = {
                    x: Math.max(-60, Math.min(60, x)),
                    y: Math.max(-60, Math.min(60, y - 45))
                };
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                // 核心重构：静态 3D 点云架构，拒绝拖尾和晕眩
                class StaticParticle {
                    constructor(tx, ty, tz, nx, ny, nz, scale) {
                        // 将 Taubin 数学坐标映射到 Canvas 屏幕坐标
                        // X 是左右，Z (Taubin的Z是上下)，Y是纵深前后
                        this.baseX = tx * scale;
                        this.baseY = -tz * scale; // 翻转 Y 轴，确保爱心尖端朝下
                        this.baseZ = ty * scale;
                        
                        // 法线映射 (同样翻转 Y)
                        this.nx = nx;
                        this.ny = -nz;
                        this.nz = ny;

                        // 归一化映射后的法线
                        let len = Math.sqrt(this.nx*this.nx + this.ny*this.ny + this.nz*this.nz) || 1;
                        this.nx /= len; this.ny /= len; this.nz /= len;

                        this.randomScale = Math.random() * 0.4 + 0.6;
                        this.phase = Math.random() * Math.PI * 2; // 用于轻微的独立呼吸
                        
                        // 运行时渲染属性
                        this.renderX = 0;
                        this.renderY = 0;
                        this.renderZ = 0;
                        this.renderNX = 0;
                        this.renderNY = 0;
                        this.renderNZ = 0;
                    }

                    update3D(angleX, angleY, pulse) {
                        // 1. 基础心跳缩放
                        let px = this.baseX * pulse;
                        let py = this.baseY * pulse;
                        let pz = this.baseZ * pulse;

                        // 2. 3D 旋转矩阵计算位置
                        let cx = Math.cos(angleX), sx = Math.sin(angleX);
                        let cy = Math.cos(angleY), sy = Math.sin(angleY);

                        let y1 = py * cx - pz * sx;
                        let z1 = py * sx + pz * cx;
                        let x2 = px * cy + z1 * sy;
                        let z2 = -px * sy + z1 * cy;

                        this.renderX = x2;
                        this.renderY = y1;
                        this.renderZ = z2;

                        // 3. 3D 旋转矩阵同步计算法线 (用于光影)
                        let ny1 = this.ny * cx - this.nz * sx;
                        let nz1 = this.ny * sx + this.nz * cx;
                        let nx2 = this.nx * cy + nz1 * sy;
                        let nz2 = -this.nx * sy + nz1 * cy;

                        this.renderNX = nx2;
                        this.renderNY = ny1;
                        this.renderNZ = nz2;
                    }

                    draw(ctx, textures, centerX, centerY, mouse) {
                        // 3D 透视投影
                        const fov = 400;
                        const perspective = fov / (fov + this.renderZ);
                        let canvasX = centerX + this.renderX * perspective;
                        let canvasY = centerY + this.renderY * perspective;

                        // 鼠标触碰时的弹性排斥，不再永久改变形状
                        if (mouse.active) {
                            let dx = canvasX - mouse.x;
                            let dy = canvasY - mouse.y;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) {
                                let force = (100 - dist) / 100;
                                canvasX += (dx / dist) * force * 15;
                                canvasY += (dy / dist) * force * 15;
                            }
                        }

                        // --- 核心光影 Shader ---
                        // 设置一个从左上前方打来的虚拟光源
                        const lx = -0.5, ly = -0.5, lz = -0.7; 
                        const dotLight = this.renderNX * lx + this.renderNY * ly + this.renderNZ * lz;
                        
                        // 判定边缘：Z 法线趋近于 0 时，说明这面朝向左右/上下，即轮廓边缘
                        const isEdge = Math.abs(this.renderNZ) < 0.25;

                        let activeTexture = textures.base;
                        let alpha = 0.8;
                        let size = textures.base.width * perspective * this.randomScale;

                        if (isEdge) {
                            // 边缘描边
                            activeTexture = textures.edge;
                            alpha = 0.95;
                            size *= 1.3;
                        } else if (this.renderNZ < 0) {
                            // 正对你的半球 (前表面)
                            if (dotLight > 0.4) {
                                // 接受到光照，产生高光
                                activeTexture = textures.highlight;
                                let intensity = (dotLight - 0.4) / 0.6; // 0~1
                                alpha = 0.6 + 0.4 * intensity;
                                size *= (1.0 + 0.5 * intensity);
                            } else {
                                // 正常的漫反射表面
                                activeTexture = textures.base;
                                alpha = 0.6;
                            }
                        } else {
                            // 背对你的半球 (背表面剔除阴影)
                            activeTexture = textures.base;
                            alpha = 0.08; // 极度暗淡，保证内部深邃的晶莹剔透感
                            size *= 0.6;
                        }

                        ctx.globalAlpha = alpha;
                        ctx.drawImage(activeTexture, canvasX - size / 2, canvasY - size / 2, size, size);
                    }
                }

                // --- 完美数学：生成 Taubin Heart ---
                const generateTaubinHeart = () => {
                    const points = [];
                    const numParticles = window.innerWidth < 768 ? 4000 : 7000;
                    const scale = window.innerWidth < 768 ? 95 : 130;

                    // 拒取采样生成分布在 3D 爱心外壳表面的粒子
                    while (points.length < numParticles) {
                        let tx = (Math.random() - 0.5) * 3;
                        let ty = (Math.random() - 0.5) * 3;
                        let tz = (Math.random() - 0.5) * 3;
                        
                        let tx2 = tx*tx, ty2 = ty*ty, tz2 = tz*tz;
                        let term = tx2 + 2.25*ty2 + tz2 - 1;
                        let f = term*term*term - tx2*tz2*tz - 0.1125*ty2*tz2*tz;
                        
                        // 提取表面薄层结构 (-0.2 ~ 0)
                        if (f <= 0.0 && f >= -0.2) { 
                            // 借助偏导数精确计算法线
                            let term2 = 3 * term * term;
                            let nx = term2 * 2 * tx - 2 * tx * tz2*tz;
                            let ny = term2 * 4.5 * ty - 0.225 * ty * tz2*tz;
                            let nz = term2 * 2 * tz - 3 * tx2 * tz2 - 0.3375 * ty2 * tz2;
                            
                            points.push(new StaticParticle(tx, ty, tz, nx, ny, nz, scale));
                        }
                    }
                    return points;
                };

                const particles = generateTaubinHeart();
                let time;

                const createTexture = (color0, color1, scaleMultiplier) => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = tCanvas.height = 2.0 * scaleMultiplier;
                    const tCtx = tCanvas.getContext('2d');
                    const center = tCanvas.width / 2;
                    const grd = tCtx.createRadialGradient(center, center, 0, center, center, center);
                    grd.addColorStop(0, color0);
                    grd.addColorStop(1, color1);
                    tCtx.fillStyle = grd;
                    tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
                    return tCanvas;
                };

                const textures = {
                    base: createTexture('rgba(255, 30, 70, 1)', 'rgba(255, 30, 70, 0)', 3),
                    edge: createTexture('rgba(255, 70, 100, 1)', 'rgba(255, 0, 40, 0)', 3.5),
                    highlight: createTexture('rgba(255, 240, 245, 1)', 'rgba(255, 120, 160, 0)', 4.5)
                };

                let smoothTilt = { x: 0, y: 0 };

                const render = () => {
                    animationFrameId = requestAnimationFrame(render);
                    const newTime = Date.now() / 1000;
                    time = newTime;
                    
                    // 彻底干脆地清空画布，绝对无拖尾
                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 如果未开启陀螺仪，用鼠标位置模拟轻微倾斜
                    let targetTiltX = tiltRef.current.x;
                    let targetTiltY = tiltRef.current.y;
                    if (!initialized && mouseRef.current.active) {
                        targetTiltX = (mouseRef.current.x - canvas.width/2) * 0.1;
                        targetTiltY = -(mouseRef.current.y - canvas.height/2) * 0.1;
                    }

                    smoothTilt.x += (targetTiltX - smoothTilt.x) * 0.1;
                    smoothTilt.y += (targetTiltY - smoothTilt.y) * 0.1;

                    if (uiRef.current) {
                        uiRef.current.style.transform = `translate3d(${-smoothTilt.x * 0.8}px, ${smoothTilt.y * 0.8}px, 0)`;
                    }

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2 - 30;
                    
                    const distToMouse = Math.sqrt(Math.pow(mouseRef.current.x - centerX, 2) + Math.pow(mouseRef.current.y - centerY, 2));
                    const targetBpm = distToMouse < 180 ? 122 : 68;
                    setBpm(b => b + (targetBpm - b) * 0.05);

                    // 整体脉搏缩放
                    const pulse = 1 + Math.sin(time * (bpm / 12)) * 0.06;
                    
                    // 摄像机视差偏移 (保持高级窗口感)
                    const angleY = -smoothTilt.x * (Math.PI / 180) * 1.2; 
                    const angleX = smoothTilt.y * (Math.PI / 180) * 1.2; 
                    const renderCenterX = centerX - smoothTilt.x * 2.5;
                    const renderCenterY = centerY + smoothTilt.y * 2.5;

                    // 1. 全局计算所有粒子的 3D 旋转状态
                    particles.forEach(p => p.update3D(angleX, angleY, pulse));

                    // 2. 深度排序 (Z-Sorting)：先画距离远的，再画距离近的，实现正确的 3D 遮挡
                    particles.sort((a, b) => b.renderZ - a.renderZ);

                    // 3. 渲染
                    particles.forEach(p => p.draw(ctx, textures, renderCenterX, renderCenterY, mouseRef.current));
                };

                render();
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('deviceorientation', handleOrientation);
                };
            }, [bpm]);

            const handleInteraction = (x, y, active) => {
                mouseRef.current = { x, y, active };
                if (active) handleFirstInteraction();
            };

            return (
                <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans text-white select-none cursor-crosshair"
                     onMouseMove={(e) => handleInteraction(e.clientX, e.clientY, true)}
                     onMouseLeave={() => handleInteraction(-1000, -1000, false)}
                     onTouchStart={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchMove={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchEnd={() => handleInteraction(-1000, -1000, false)}>
                    
                    <div className="absolute inset-0 pointer-events-none opacity-5" style={{ backgroundImage: 'radial-gradient(#ff1e46 1px, transparent 1px)', backgroundSize: '50px 50px' }} />
                    <canvas ref={canvasRef} className="absolute inset-0" />
                    
                    <div ref={uiRef} id="ui-wrapper" className="absolute inset-0 pointer-events-none">
                        <nav className="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-red-500/30 flex items-center justify-center rotate-45">
                                    <i data-lucide="heart" className="w-3 h-3 text-red-500/80 -rotate-45 fill-red-500/40"></i>
                                </div>
                                <span className="font-bold tracking-[0.4em] text-[9px] opacity-40 uppercase">FOREVER_HEART.sys</span>
                            </div>
                        </nav>

                        <div className="absolute top-[65%] md:top-[70%] left-1/2 -translate-x-1/2 flex flex-col items-center justify-center w-full max-w-[100vw] px-4 box-border animate-fade">
                            <div className="flex items-center justify-center gap-2 sm:gap-4 md:gap-8 font-black text-white/95 drop-shadow-[0_0_25px_rgba(255,30,70,0.5)]">
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">XIAO</span>
                                <i data-lucide="heart" className="w-[clamp(2rem,6vw,4rem)] h-[clamp(2rem,6vw,4rem)] text-red-500 fill-red-500 animate-pulse shrink-0"></i>
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">DING</span>
                            </div>
                            <div className="h-[1px] w-32 md:w-64 bg-gradient-to-r from-transparent via-red-500/30 to-transparent mt-4 md:mt-8" />
                        </div>

                        <div className="absolute bottom-0 left-0 w-full p-8 md:p-10 flex justify-between items-end opacity-30 text-[9px] tracking-[0.2em] font-mono uppercase">
                            <div className="flex flex-col gap-1">
                                <div>Sync: Stable</div>
                                <div>BPM: {Math.round(bpm)}</div>
                            </div>
                            <div className="text-right tracking-[0.3em]">
                                X & D <br/> Affinity
                            </div>
                        </div>
                    </div>

                    {!initialized && (
                        <div className="absolute top-[85%] left-1/2 -translate-x-1/2 pointer-events-none animate-pulse text-[10px] tracking-[0.6em] opacity-40 uppercase text-center w-full">
                            Touch to start affinity
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 300);
    </script>
</body>
</html>
