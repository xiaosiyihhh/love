<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIAO ❤️ DING</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 加载 React 相关库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 加载 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 加载 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95) translateX(-50%); }
            to { opacity: 1; transform: scale(1) translateX(-50%); }
        }
        .animate-fade { 
            animation: fade-in 1.5s ease-out forwards; 
            transform-origin: left center;
        }
        #ui-wrapper {
            will-change: transform;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const App = () => {
            const canvasRef = useRef(null);
            const uiRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000, active: false });
            const tiltRef = useRef({ x: 0, y: 0 }); 
            const [bpm, setBpm] = useState(72);
            const [initialized, setInitialized] = useState(false);

            // 陀螺仪逻辑：在第一次交互时触发
            const handleFirstInteraction = async () => {
                if (initialized) return;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) { console.log("Motion access blocked"); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                setInitialized(true);
            };

            const handleOrientation = (event) => {
                let x = event.gamma || 0; 
                let y = event.beta || 0;
                
                // 限制陀螺仪角度范围，用于 3D 旋转的基准数值
                tiltRef.current = {
                    x: Math.max(-45, Math.min(45, x)),
                    y: Math.max(-45, Math.min(45, y - 45))
                };
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const settings = {
                    particles: { 
                        length: window.innerWidth < 768 ? 2200 : 3800,
                        duration: 2.5, 
                        velocity: 85, 
                        effect: -0.6, 
                        size: window.innerWidth < 768 ? 1.6 : 2.0
                    },
                    interaction: { radius: 110, strength: 120 } 
                };

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                // 核心升级：3D 粒子生成函数
                const pointOnHeart3D = (t, p) => {
                    const scale = window.innerWidth < 768 ? 0.75 : 1.1;
                    // X 和 Y 构建爱心的二维切面
                    const baseX = 16 * Math.pow(Math.sin(t), 3);
                    const baseY = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 3 * Math.cos(3 * t) - Math.cos(4 * t);
                    // Z 轴增加纵深，构建 3D 曲面体积感
                    const z = Math.abs(baseX) * Math.cos(p) * 0.8; 

                    return {
                        x: baseX * 11.25 * scale,
                        y: baseY * 11.5 * scale, // 保持数学正向 Y，稍后在 Canvas 里反转
                        z: z * 11.25 * scale
                    };
                };

                class Particle {
                    constructor() {
                        this.position = { x: 0, y: 0 };
                        this.velocity = { x: 0, y: 0 };
                        this.acceleration = { x: 0, y: 0 };
                        this.age = 0;
                        this.randomScale = Math.random() * 0.5 + 0.5;
                    }
                    initialize(x, y, dx, dy, perspectiveScale) {
                        this.position.x = x; this.position.y = y;
                        this.velocity.x = dx; this.velocity.y = dy;
                        this.acceleration.x = dx * settings.particles.effect;
                        this.acceleration.y = dy * settings.particles.effect;
                        this.age = 0;
                        // 距离屏幕越近的粒子，初始尺寸略微放大，增强 3D 视觉感
                        this.perspectiveScale = perspectiveScale; 
                    }
                    update(deltaTime, mouse, offsetX, offsetY) {
                        this.position.x += this.velocity.x * deltaTime;
                        this.position.y += this.velocity.y * deltaTime;
                        this.velocity.x += this.acceleration.x * deltaTime;
                        this.velocity.y += this.acceleration.y * deltaTime;
                        this.age += deltaTime;

                        if (mouse.active) {
                            const drawnX = this.position.x + offsetX;
                            const drawnY = this.position.y + offsetY;
                            const dx = drawnX - mouse.x;
                            const dy = drawnY - mouse.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < settings.interaction.radius) {
                                const safeDistance = Math.max(1, distance);
                                const force = (settings.interaction.radius - distance) / settings.interaction.radius;
                                this.position.x += (dx / safeDistance) * force * settings.interaction.strength * deltaTime;
                                this.position.y += (dy / safeDistance) * force * settings.interaction.strength * deltaTime;
                            }
                        }
                    }
                    draw(ctx, image, offsetX, offsetY) {
                        const ease = (t) => (--t) * t * t + 1;
                        const progress = this.age / settings.particles.duration;
                        // 应用透视缩放比例
                        const size = image.width * ease(progress) * this.randomScale * this.perspectiveScale;
                        ctx.globalAlpha = (1 - progress) * 0.8;
                        ctx.drawImage(image, this.position.x - size / 2 + offsetX, this.position.y - size / 2 + offsetY, size, size);
                    }
                }

                class ParticlePool {
                    constructor(length) {
                        this.particles = Array.from({length}, () => new Particle());
                        this.firstActive = 0; this.firstFree = 0;
                        this.duration = settings.particles.duration;
                    }
                    add(x, y, dx, dy, perspectiveScale) {
                        this.particles[this.firstFree].initialize(x, y, dx, dy, perspectiveScale);
                        this.firstFree = (this.firstFree + 1) % this.particles.length;
                        if (this.firstActive === this.firstFree) this.firstActive = (this.firstActive + 1) % this.particles.length;
                    }
                    update(deltaTime, mouse, offsetX, offsetY) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].update(deltaTime, mouse, offsetX, offsetY);
                            i = (i + 1) % this.particles.length;
                        }
                        while (this.particles[this.firstActive].age >= this.duration && this.firstActive !== this.firstFree) {
                            this.firstActive = (this.firstActive + 1) % this.particles.length;
                        }
                    }
                    draw(ctx, image, offsetX, offsetY) {
                        let i = this.firstActive;
                        while (i !== this.firstFree) {
                            this.particles[i].draw(ctx, image, offsetX, offsetY);
                            i = (i + 1) % this.particles.length;
                        }
                    }
                }

                const particles = new ParticlePool(settings.particles.length);
                const particleRate = settings.particles.length / settings.particles.duration;
                let time;

                const texture = (() => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = tCanvas.height = settings.particles.size * 3;
                    const tCtx = tCanvas.getContext('2d');
                    const grd = tCtx.createRadialGradient(tCanvas.width/2, tCanvas.height/2, 0, tCanvas.width/2, tCanvas.height/2, tCanvas.width/2);
                    grd.addColorStop(0, 'rgba(255, 30, 70, 1)');
                    grd.addColorStop(1, 'rgba(255, 30, 70, 0)');
                    tCtx.fillStyle = grd;
                    tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
                    return tCanvas;
                })();

                let smoothTilt = { x: 0, y: 0 };

                const render = () => {
                    animationFrameId = requestAnimationFrame(render);
                    const newTime = Date.now() / 1000;
                    const deltaTime = newTime - (time || newTime);
                    time = newTime;
                    
                    ctx.fillStyle = 'rgba(5, 5, 5, 0.23)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 平滑跟随逻辑
                    smoothTilt.x += (tiltRef.current.x - smoothTilt.x) * 0.1;
                    smoothTilt.y += (tiltRef.current.y - smoothTilt.y) * 0.1;

                    // UI 仅作轻微的平移视差
                    if (uiRef.current) {
                        uiRef.current.style.transform = `translate3d(${smoothTilt.x * 0.5}px, ${smoothTilt.y * 0.5}px, 0)`;
                    }

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2 - 40;
                    
                    // 互动心跳加速
                    const distToMouse = Math.sqrt(Math.pow(mouseRef.current.x - (centerX + smoothTilt.x*0.5), 2) + Math.pow(mouseRef.current.y - (centerY + smoothTilt.y*0.5), 2));
                    const targetBpm = distToMouse < 180 ? 122 : 68;
                    setBpm(b => b + (targetBpm - b) * 0.05);

                    const pulse = 1 + Math.sin(time * (bpm / 12)) * 0.08;
                    const amount = particleRate * deltaTime;
                    
                    // 将陀螺仪倾斜转化为 3D 旋转弧度
                    const angleY = smoothTilt.x * 0.025; // 左右旋转
                    const angleX = -smoothTilt.y * 0.025; // 上下旋转

                    for (let i = 0; i < amount; i++) {
                        const t = 2 * Math.PI * Math.random();
                        const p = 2 * Math.PI * Math.random();
                        
                        // 1. 获取 3D 爱心表面坐标
                        const pos3D = pointOnHeart3D(t, p);
                        
                        // 2. 绕 Y 轴旋转 (实现左右晃动展现 3D 侧面)
                        let x1 = pos3D.x * Math.cos(angleY) - pos3D.z * Math.sin(angleY);
                        let z1 = pos3D.x * Math.sin(angleY) + pos3D.z * Math.cos(angleY);

                        // 3. 绕 X 轴旋转 (实现上下晃动展现顶部/底部)
                        let y1 = pos3D.y * Math.cos(angleX) - z1 * Math.sin(angleX);
                        let z2 = pos3D.y * Math.sin(angleX) + z1 * Math.cos(angleX);

                        // 4. 应用心跳缩放
                        x1 *= pulse;
                        y1 *= pulse;
                        z2 *= pulse;

                        // 5. 3D 透视投影 (Perspective Projection)
                        // z2 代表深度，距离越近 (正值) 粒子越大并稍微偏移
                        const perspective = 300 / (300 + z2);
                        const canvasX = x1 * perspective;
                        const canvasY = -y1 * perspective; // 反转 Y 轴以匹配 Canvas 坐标系

                        const len = Math.sqrt(canvasX * canvasX + canvasY * canvasY) || 1;
                        
                        particles.add(
                            centerX + canvasX, 
                            centerY + canvasY, 
                            (canvasX / len) * settings.particles.velocity, 
                            (canvasY / len) * settings.particles.velocity,
                            perspective // 传递透视比例给粒子
                        );
                    }
                    
                    particles.update(deltaTime, mouseRef.current, smoothTilt.x * 0.5, smoothTilt.y * 0.5);
                    particles.draw(ctx, texture, smoothTilt.x * 0.5, smoothTilt.y * 0.5);
                };

                render();
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('deviceorientation', handleOrientation);
                };
            }, [bpm]);

            const handleInteraction = (x, y, active) => {
                mouseRef.current = { x, y, active };
                if (active) handleFirstInteraction();
            };

            return (
                <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans text-white select-none cursor-crosshair"
                     onMouseMove={(e) => handleInteraction(e.clientX, e.clientY, true)}
                     onMouseLeave={() => handleInteraction(-1000, -1000, false)}
                     onTouchStart={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchMove={(e) => handleInteraction(e.touches[0].clientX, e.touches[0].clientY, true)}
                     onTouchEnd={() => handleInteraction(-1000, -1000, false)}>
                    
                    <div className="absolute inset-0 pointer-events-none opacity-5" style={{ backgroundImage: 'radial-gradient(#ff1e46 1px, transparent 1px)', backgroundSize: '50px 50px' }} />
                    <canvas ref={canvasRef} className="absolute inset-0" />
                    
                    <div ref={uiRef} id="ui-wrapper" className="absolute inset-0 pointer-events-none">
                        <nav className="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-red-500/30 flex items-center justify-center rotate-45">
                                    <i data-lucide="heart" className="w-3 h-3 text-red-500/80 -rotate-45 fill-red-500/40"></i>
                                </div>
                                <span className="font-bold tracking-[0.4em] text-[9px] opacity-40 uppercase">FOREVER_HEART.sys</span>
                            </div>
                        </nav>

                        {/* 修正后的自适应文字容器：防止溢出并强制不换行 */}
                        <div className="absolute top-[65%] md:top-[70%] left-1/2 -translate-x-1/2 flex flex-col items-center justify-center w-full px-4 animate-fade">
                            <div className="flex items-center justify-center gap-2 sm:gap-4 md:gap-8 text-2xl sm:text-4xl md:text-6xl font-black tracking-[0.1em] sm:tracking-[0.2em] text-white/95 drop-shadow-[0_0_25px_rgba(255,30,70,0.5)] whitespace-nowrap">
                                <span>XIAO</span>
                                <i data-lucide="heart" className="w-8 h-8 sm:w-10 sm:h-10 md:w-16 md:h-16 text-red-500 fill-red-500 animate-pulse shrink-0"></i>
                                <span>DING</span>
                            </div>
                            <div className="h-[1px] w-32 md:w-64 bg-gradient-to-r from-transparent via-red-500/30 to-transparent mt-4 md:mt-8" />
                        </div>

                        <div className="absolute bottom-0 left-0 w-full p-8 md:p-10 flex justify-between items-end opacity-30 text-[9px] tracking-[0.2em] font-mono uppercase">
                            <div className="flex flex-col gap-1">
                                <div>Sync: Stable</div>
                                <div>BPM: {Math.round(bpm)}</div>
                            </div>
                            <div className="text-right tracking-[0.3em]">
                                X & D <br/> Affinity
                            </div>
                        </div>
                    </div>

                    {!initialized && (
                        <div className="absolute top-[85%] left-1/2 -translate-x-1/2 pointer-events-none animate-pulse text-[10px] tracking-[0.6em] opacity-40 uppercase text-center w-full">
                            Touch to start affinity
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 300);
    </script>
</body>
</html>
