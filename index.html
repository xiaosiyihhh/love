<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIAO ❤️ DING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95) translateX(-50%); }
            to { opacity: 1; transform: scale(1) translateX(-50%); }
        }
        .animate-fade { 
            animation: fade-in 1.5s ease-out forwards; 
            transform-origin: left center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const App = () => {
            const canvasRef = useRef(null);
            const uiRef = useRef(null);
            const tiltRef = useRef({ x: 0, y: 0 }); 
            const [bpm, setBpm] = useState(72);
            const [initialized, setInitialized] = useState(false);

            const handleFirstInteraction = async () => {
                if (initialized) return;
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    } catch (e) { console.log("Motion access blocked"); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                setInitialized(true);
            };

            const handleOrientation = (event) => {
                let x = event.gamma || 0; let y = event.beta || 0;
                tiltRef.current = {
                    x: Math.max(-60, Math.min(60, x)),
                    y: Math.max(-60, Math.min(60, y - 45))
                };
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                class DualSystemParticle {
                    constructor(tx, ty, tz, nx, ny, nz, scale, type) {
                        this.baseX = tx * scale;
                        this.baseY = -tz * scale; 
                        this.baseZ = ty * scale * 0.65; 
                        
                        this.nx = nx; this.ny = -nz; this.nz = ny;
                        let len = Math.sqrt(this.nx*this.nx + this.ny*this.ny + this.nz*this.nz) || 1;
                        this.nx /= len; this.ny /= len; this.nz /= len;

                        this.type = type; 

                        this.densityThreshold = Math.random(); 
                        this.randomScale = Math.random() * 0.5 + 0.6;
                        
                        this.renderX = 0; this.renderY = 0; this.renderZ = 0;
                        this.renderNX = 0; this.renderNY = 0; this.renderNZ = 0;

                        this.currentAlpha = 0; 
                        this.beatAlpha = 0;
                    }

                    update3D(angleX, angleY, globalBeat) {
                        let px = this.baseX;
                        let py = this.baseY;
                        let pz = this.baseZ;

                        if (this.type === 0) {
                            // 构型组：伴随全局能量产生极致平滑的整体缩放
                            let pulse = 1 + globalBeat * 0.05;
                            px *= pulse; py *= pulse; pz *= pulse;
                        } else if (this.type === 1) {
                            // 脉冲组：呼吸式推射，平缓自然
                            let offset = globalBeat * 30.0 * this.randomScale;
                            px += this.nx * offset;
                            py += this.ny * offset;
                            pz += this.nz * offset;

                            // 呼吸粒子亮度也随之平滑增减
                            this.beatAlpha = 0.15 + globalBeat * 0.85;
                        }

                        let cx = Math.cos(angleX), sx = Math.sin(angleX);
                        let cy = Math.cos(angleY), sy = Math.sin(angleY);

                        let y1 = py * cx - pz * sx;
                        let z1 = py * sx + pz * cx;
                        this.renderX = px * cy + z1 * sy;
                        this.renderY = y1;
                        this.renderZ = -px * sy + z1 * cy;

                        let ny1 = this.ny * cx - this.nz * sx;
                        let nz1 = this.ny * sx + this.nz * cx;
                        this.renderNX = this.nx * cy + nz1 * sy;
                        this.renderNY = ny1;
                        this.renderNZ = -this.nx * sy + nz1 * cy;
                    }

                    draw(ctx, texture, centerX, centerY, globalBeat) {
                        const fov = 400;
                        const perspective = fov / (fov + this.renderZ);
                        let canvasX = centerX + this.renderX * perspective;
                        let canvasY = centerY + this.renderY * perspective;

                        if (this.type === 0) {
                            const lx = 0.8, ly = -0.8, lz = -0.5; 
                            const lLen = Math.sqrt(lx*lx + ly*ly + lz*lz);
                            const nLx = lx/lLen, nLy = ly/lLen, nLz = lz/lLen;
                            
                            const dotLight = this.renderNX * nLx + this.renderNY * nLy + this.renderNZ * nLz;
                            
                            let lightIntensity = Math.max(0, dotLight);
                            let edgeIntensity = Math.pow(1.0 - Math.abs(this.renderNZ), 4.0);

                            let targetDensity = 0.01; 
                            
                            if (this.renderNZ < 0) { 
                                targetDensity += Math.pow(lightIntensity, 1.2) * 0.95; 
                                targetDensity += edgeIntensity * 0.3; 
                            } else { 
                                targetDensity += edgeIntensity * 0.1; 
                            }

                            let visibleFactor = targetDensity - this.densityThreshold;
                            let targetAlpha = 0;
                            
                            if (visibleFactor > 0) {
                                targetAlpha = Math.min(1.0, visibleFactor * 6.0) * 0.95;
                            }

                            this.currentAlpha += (targetAlpha - this.currentAlpha) * 0.12;

                            if (this.currentAlpha > 0.02) {
                                ctx.globalAlpha = this.currentAlpha;
                                let size = texture.width * perspective * this.randomScale;
                                ctx.drawImage(texture, canvasX - size / 2, canvasY - size / 2, size, size);
                            }
                        } else if (this.type === 1) {
                            // 只要处于正面，呼吸粒子就会一直被绘制
                            if (this.renderNZ < 0.2) { 
                                ctx.globalAlpha = this.beatAlpha * this.randomScale;
                                // 随呼吸微弱放大
                                let size = texture.width * perspective * this.randomScale * (1.2 + globalBeat * 0.6);
                                ctx.drawImage(texture, canvasX - size / 2, canvasY - size / 2, size, size);
                            }
                        }
                    }
                }

                const generateTaubinHeart = () => {
                    const points = [];
                    const numCoreParticles = window.innerWidth < 768 ? 4000 : 7000; 
                    const numBeatParticles = window.innerWidth < 768 ? 1000 : 1800; 
                    
                    const scale = window.innerWidth < 768 ? 180 : 250; 
                    const totalParticles = numCoreParticles + numBeatParticles;

                    while (points.length < totalParticles) {
                        let tx = (Math.random() - 0.5) * 3;
                        let ty = (Math.random() - 0.5) * 3;
                        let tz = (Math.random() - 0.5) * 3;
                        
                        let tx2 = tx*tx, ty2 = ty*ty, tz2 = tz*tz;
                        let term = tx2 + 2.25*ty2 + tz2 - 1;
                        let f = term*term*term - tx2*tz2*tz - 0.1125*ty2*tz2*tz;
                        
                        if (f <= 0.0 && f >= -0.15) { 
                            let term2 = 3 * term * term;
                            let nx = term2 * 2 * tx - 2 * tx * tz2*tz;
                            let ny = term2 * 4.5 * ty - 0.225 * ty * tz2*tz;
                            let nz = term2 * 2 * tz - 3 * tx2 * tz2 - 0.3375 * ty2 * tz2;
                            
                            const type = points.length < numCoreParticles ? 0 : 1;
                            points.push(new DualSystemParticle(tx, ty, tz, nx, ny, nz, scale, type));
                        }
                    }
                    return points;
                };

                const particles = generateTaubinHeart();
                let time;

                const createPureParticle = () => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = tCanvas.height = 4;
                    const tCtx = tCanvas.getContext('2d');
                    tCtx.fillStyle = 'rgba(255, 15, 30, 0.95)'; 
                    tCtx.beginPath();
                    tCtx.arc(2, 2, 1.5, 0, Math.PI * 2);
                    tCtx.fill();
                    return tCanvas;
                };
                const pureTexture = createPureParticle();

                let smoothTilt = { x: 0, y: 0 };

                const render = () => {
                    animationFrameId = requestAnimationFrame(render);
                    const newTime = Date.now() / 1000;
                    time = newTime;
                    
                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    let targetTiltX = tiltRef.current.x;
                    let targetTiltY = tiltRef.current.y;

                    smoothTilt.x += (targetTiltX - smoothTilt.x) * 0.05;
                    smoothTilt.y += (targetTiltY - smoothTilt.y) * 0.05;

                    if (uiRef.current) {
                        uiRef.current.style.transform = `translate3d(${-smoothTilt.x * 0.5}px, ${smoothTilt.y * 0.5}px, 0)`;
                    }

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2 - 30;
                    
                    const currentBpm = 72;
                    setBpm(currentBpm);

                    // ========================================================
                    // 核心修改：单次平滑的呼吸感脉动
                    // ========================================================
                    let bps = currentBpm / 60;
                    let phase = time * bps * Math.PI * 2;
                    
                    // 利用正弦函数生成完美的平滑呼吸曲线 (0 到 1)
                    // 减去 Math.PI / 2 让它从 0 开始，1.5 次方让收缩状态停留的时间稍微长一点，更像自然呼吸
                    let globalBeat = Math.pow((Math.sin(phase - Math.PI / 2) + 1) / 2, 1.5);
                    // ========================================================

                    const angleY = -smoothTilt.x * (Math.PI / 180) * 1.0; 
                    const angleX = smoothTilt.y * (Math.PI / 180) * 1.0; 
                    const renderCenterX = centerX - smoothTilt.x * 1.5;
                    const renderCenterY = centerY + smoothTilt.y * 1.5;

                    particles.forEach(p => p.update3D(angleX, angleY, globalBeat));
                    particles.sort((a, b) => b.renderZ - a.renderZ);
                    particles.forEach(p => p.draw(ctx, pureTexture, renderCenterX, renderCenterY, globalBeat));
                };

                render();
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('deviceorientation', handleOrientation);
                };
            }, []);

            return (
                <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans text-white select-none cursor-default"
                     onClick={handleFirstInteraction}>
                    
                    <div className="absolute inset-0 pointer-events-none opacity-5" style={{ backgroundImage: 'radial-gradient(#ff1432 1px, transparent 1px)', backgroundSize: '50px 50px' }} />
                    <canvas ref={canvasRef} className="absolute inset-0" />
                    
                    <div ref={uiRef} id="ui-wrapper" className="absolute inset-0 pointer-events-none">
                        <nav className="absolute top-0 left-0 w-full p-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-red-500/30 flex items-center justify-center rotate-45">
                                    <i data-lucide="heart" className="w-3 h-3 text-red-500/80 -rotate-45 fill-red-500/40"></i>
                                </div>
                                <span className="font-bold tracking-[0.4em] text-[9px] opacity-40 uppercase">FOREVER_HEART.sys</span>
                            </div>
                        </nav>

                        <div className="absolute top-[65%] md:top-[70%] left-1/2 -translate-x-1/2 flex flex-col items-center justify-center w-full max-w-[100vw] px-4 box-border animate-fade">
                            <div className="flex items-center justify-center gap-2 sm:gap-4 md:gap-8 font-black text-white/95 drop-shadow-[0_0_25px_rgba(255,20,50,0.5)]">
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">XIAO</span>
                                <i data-lucide="heart" className="w-[clamp(2rem,6vw,4rem)] h-[clamp(2rem,6vw,4rem)] text-red-500 fill-red-500 animate-pulse shrink-0"></i>
                                <span className="text-[clamp(1.8rem,7vw,3.75rem)] tracking-[0.1em] sm:tracking-[0.2em]">DING</span>
                            </div>
                            <div className="h-[1px] w-32 md:w-64 bg-gradient-to-r from-transparent via-red-500/30 to-transparent mt-4 md:mt-8" />
                        </div>

                        <div className="absolute bottom-0 left-0 w-full p-8 md:p-10 flex justify-between items-end opacity-30 text-[9px] tracking-[0.2em] font-mono uppercase">
                            <div className="flex flex-col gap-1">
                                <div>Sync: Stable</div>
                                <div>BPM: {Math.round(bpm)}</div>
                            </div>
                            <div className="text-right tracking-[0.3em]">
                                X & D <br/> Affinity
                            </div>
                        </div>
                    </div>

                    {!initialized && (
                        <div className="absolute top-[85%] left-1/2 -translate-x-1/2 pointer-events-none animate-pulse text-[10px] tracking-[0.6em] opacity-40 uppercase text-center w-full">
                            Touch to start affinity
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 300);
    </script>
</body>
</html>
